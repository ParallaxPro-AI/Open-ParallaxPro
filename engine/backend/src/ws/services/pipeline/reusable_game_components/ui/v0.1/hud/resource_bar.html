<!-- description: Top bar showing gold, food, production, science, culture resources — also: resource counter, economy bar, currency display, material tracking, civilization resources -->
<!DOCTYPE html>
<html>
<head>
<meta name="pp-responsive" content="1">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', system-ui, sans-serif; color: #f0f0f0; pointer-events: none; overflow: hidden; }
  .resource-bar {
    position: fixed; top: 0; left: 0; right: 0;
    background: rgba(10, 8, 5, 0.7); backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(255,255,255,0.06);
    display: flex; align-items: center; justify-content: center;
    gap: 20px; padding: 6px 24px; height: 38px;
  }
  .res-item { display: flex; align-items: center; gap: 5px; }
  .res-icon { font-size: 14px; }
  .res-label { font-size: 9px; font-weight: 700; color: #666; letter-spacing: 1px; text-transform: uppercase; }
  .res-val { font-size: 15px; font-weight: 800; font-variant-numeric: tabular-nums; }
  .gold { color: #f59e0b; text-shadow: 0 0 6px rgba(245,158,11,0.3); }
  .food { color: #22c55e; text-shadow: 0 0 6px rgba(34,197,94,0.3); }
  .prod { color: #f97316; text-shadow: 0 0 6px rgba(249,115,22,0.3); }
  .sci { color: #3b82f6; text-shadow: 0 0 6px rgba(59,130,246,0.3); }
  .cult { color: #a78bfa; text-shadow: 0 0 6px rgba(167,139,250,0.3); }

  /* Mobile (touch primary): tighter top strip — 5 resources need to fit
     a phone width. Drop the labels (icons + numbers are enough on a phone).
     Respect the top safe area. */
  @media (pointer: coarse) {
    .resource-bar { gap: 10px; padding: 4px 8px; height: 32px; padding-top: max(4px, env(safe-area-inset-top)); }
    .res-icon { font-size: 12px; }
    .res-label { display: none; }
    .res-val { font-size: 13px; }
  }
</style>
</head>
<body>
<div class="resource-bar">
  <div class="res-item"><span class="res-icon">&#9733;</span><span class="res-val gold" id="gold">50</span></div>
  <div class="res-item"><span class="res-icon">&#9752;</span><span class="res-val food" id="food">10</span></div>
  <div class="res-item"><span class="res-icon">&#9874;</span><span class="res-val prod" id="prod">5</span></div>
  <div class="res-item"><span class="res-icon">&#9883;</span><span class="res-val sci" id="sci">3</span></div>
  <div class="res-item"><span class="res-icon">&#9830;</span><span class="res-val cult" id="cult">1</span></div>
</div>
<script>
(function(){
  function update(s){if(!s)return;
    if(s.gold!==undefined)document.getElementById('gold').textContent=s.gold;
    if(s.food!==undefined)document.getElementById('food').textContent=s.food;
    if(s.production!==undefined)document.getElementById('prod').textContent=s.production;
    if(s.science!==undefined)document.getElementById('sci').textContent=s.science;
    if(s.culture!==undefined)document.getElementById('cult').textContent=s.culture;
  }
  window.addEventListener('message',function(e){if(e.data&&e.data.type==='gameState')update(e.data.state);});
})();
</script>
</body>
</html>
