<!-- description: in-game text chat log with scrollable message history and input — chat window, message log, player messages, game chat, communication panel -->
<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
    color: #eaf0f6;
    background: transparent;
    pointer-events: none;
    overflow: hidden;
  }
  .box {
    /* z-index 150: above every shipped HUD layer (highest in-template
       HUD is 100 in soccer/banner_siege; rift HUD tops out at 20),
       below modal overlays (pause_menu 250, wasted 300, game_over 200)
       which legitimately want to cover the chat. Bottom-left anchor
       unchanged — only the layering needed adjusting. */
    position: fixed; bottom: 14px; left: 14px; z-index: 150;
    width: min(380px, 46vw);
    display: flex; flex-direction: column;
    gap: 6px;
    pointer-events: none;
  }
  .log {
    /* Idle by default — log is invisible until something happens
       (new message, user opens input, or user double-taps Enter to
       peek at history). The .show class is added by JS for a few
       seconds whenever activity occurs, then removed so the log
       fades back out. Game-chat convention: stay out of the way
       when nobody's talking. */
    max-height: 180px;
    overflow-y: auto;
    display: flex; flex-direction: column;
    gap: 2px;
    padding: 6px 8px;
    font-size: 12px;
    font-family: 'Menlo', 'Consolas', monospace;
    border-radius: 8px;
    background: rgba(8,8,14,0.35);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s ease, background 0.2s;
  }
  .log.show { opacity: 1; pointer-events: auto; }
  .log.empty { background: transparent; }
  .log::-webkit-scrollbar { width: 4px; }
  .log::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
  .line {
    padding: 1px 4px;
    white-space: pre-wrap;
    word-break: break-word;
    text-shadow: 0 1px 2px rgba(0,0,0,0.65);
  }
  .line .user { color: #8b5cf6; font-weight: 700; margin-right: 4px; }
  .line.me .user { color: #22c55e; }
  .line.sys .body { color: #6b7280; font-style: italic; }

  .input-row {
    display: none;
    pointer-events: auto;
    align-items: center;
    background: rgba(8,8,14,0.82);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    padding: 6px 8px;
    gap: 8px;
    backdrop-filter: blur(6px);
  }
  .input-row.open { display: flex; }
  .input-row .prefix {
    font-size: 11px; color: #6366f1;
    letter-spacing: 1.5px; text-transform: uppercase; font-weight: 700;
  }
  .input-row input {
    flex: 1;
    background: transparent;
    border: 0; outline: none;
    color: #eaf0f6;
    font-family: inherit; font-size: 13px;
  }
  .hint {
    font-size: 10px; color: #3e4550;
    text-transform: uppercase; letter-spacing: 1px;
    padding-left: 8px;
    pointer-events: auto; cursor: pointer;
  }
  .hint:hover { color: #6b7280; }
</style>
</head>
<body>
<div class="box">
  <div class="log empty" id="log"></div>
  <div class="input-row" id="input-row">
    <div class="prefix">Say:</div>
    <input id="input" type="text" maxlength="400" autocomplete="off" spellcheck="false" />
  </div>
  <div class="hint" id="hint">Press Enter to chat</div>
</div>
<script>
(function () {
  function __cp(n){try{if(window.parent&&window.parent.ppCheckpoint)window.parent.ppCheckpoint('text_chat: '+n);}catch(_){}}
  __cp('script booted');
  var logEl = document.getElementById('log');
  var inputRow = document.getElementById('input-row');
  var input = document.getElementById('input');
  var hint = document.getElementById('hint');
  var localUsername = '';
  var fadeTimer = null;
  var justClosedAt = 0;
  var IDLE_FADE_MS = 5000;       // how long the log stays visible after activity
  var DOUBLE_TAP_MS = 400;       // window for double-tap-Enter peek
  var lastEnterAt = 0;
  var lastHistoryLen = 0;        // tracks chatHistory.length so we only surface the log on actual new messages, not every gameState re-render

  function showLog(stayMs) {
    // Make the log visible. Cancel any pending fade. If stayMs > 0,
    // schedule a fade after that long; if 0, sticky-show until a
    // future closeInput / explicit hide. Don't auto-fade while the
    // input is open — user is mid-conversation.
    logEl.classList.add('show');
    if (fadeTimer) { clearTimeout(fadeTimer); fadeTimer = null; }
    if (stayMs > 0) {
      fadeTimer = setTimeout(function () {
        if (!inputRow.classList.contains('open')) {
          logEl.classList.remove('show');
        }
      }, stayMs);
    }
  }

  function emit(action, payload) {
    var msg = { type: 'game_command', action: action };
    if (payload) msg.payload = payload;
    window.parent.postMessage(msg, '*');
  }

  function escape(s) {
    return String(s || '').replace(/[&<>"']/g, function (c) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
    });
  }

  function scrollDown() {
    logEl.scrollTop = logEl.scrollHeight;
  }

  function appendLine(cls, html) {
    var line = document.createElement('div');
    line.className = 'line ' + (cls || '');
    line.innerHTML = html;
    logEl.appendChild(line);
    logEl.classList.remove('empty');
    while (logEl.childNodes.length > 80) logEl.removeChild(logEl.firstChild);
    scrollDown();
    // Note: appendLine does NOT call showLog here — it gets called
    // from renderAll on every gameState frame (60 Hz), which would
    // reset the fade timer constantly and the log would never fade.
    // Genuine "new message arrived" surfacing happens at the call sites
    // that know it's actually new (chat_append, chat_system, or a
    // history-length-grew detection in the gameState handler).
  }

  function renderAll(messages) {
    logEl.innerHTML = '';
    (messages || []).forEach(function (m) {
      var isMe = m.fromUsername === localUsername;
      appendLine(isMe ? 'me' : '',
        '<span class="user">' + escape(m.fromUsername) + ':</span>' +
        '<span class="body">' + escape(m.body) + '</span>');
    });
    if (!messages || !messages.length) {
      logEl.classList.add('empty');
      // No history → don't surface anything.
      logEl.classList.remove('show');
      if (fadeTimer) { clearTimeout(fadeTimer); fadeTimer = null; }
    }
  }

  function openInput() {
    if (inputRow.classList.contains('open')) return;
    // Ignore open pulses that arrive right after a close — the race between
    // chat_focus:false propagating through the parent and the next state
    // resend would otherwise flicker the input back open.
    if (Date.now() - justClosedAt < 600) return;
    inputRow.classList.add('open');
    hint.style.display = 'none';
    input.value = '';
    setTimeout(function () { input.focus(); }, 20);
    emit('chat_focus', { focus: true });
    // While typing, the log stays visible — clear any pending fade.
    showLog(0);
  }
  function closeInput() {
    if (!inputRow.classList.contains('open')) return;
    inputRow.classList.remove('open');
    hint.style.display = '';
    justClosedAt = Date.now();
    // Grace window after close so the user can read what they just sent
    // / what the other peer typed mid-exchange before the log fades.
    showLog(IDLE_FADE_MS);
    try { input.blur(); } catch (e) {}
    // Handing focus back to the parent canvas is critical: blurring our
    // own input only moves focus off it within THIS sub-iframe, the
    // sub-iframe itself still holds document focus. Any WASD keydown the
    // user presses next fires inside this iframe and never reaches the
    // game's window-level listeners — the character would refuse to move
    // until the user clicked the canvas manually.
    try {
      var canvas = window.parent && window.parent.document && window.parent.document.querySelector('canvas');
      if (canvas && canvas.focus) canvas.focus();
      else if (window.parent && window.parent.focus) window.parent.focus();
    } catch (e) { /* cross-origin parent — nothing we can do */ }
    emit('chat_focus', { focus: false });
  }

  hint.onclick = openInput;

  input.addEventListener('keydown', function (e) {
    if (e.key === 'Enter') {
      var body = input.value.trim();
      if (body) emit('send_chat', { body: body });
      closeInput();
    } else if (e.key === 'Escape') {
      closeInput();
    }
  });

  document.addEventListener('keydown', function (e) {
    if (inputRow.classList.contains('open')) return;
    // 't' or 'Enter' opens chat (while iframe has focus). Parent forwards its own t/Enter via postMessage too.
    if (e.key === 't' || e.key === 'Enter') {
      e.preventDefault();
      var now = Date.now();
      if (e.key === 'Enter' && now - lastEnterAt < DOUBLE_TAP_MS) {
        // Double-tap Enter: peek at the log without entering chat mode
        // (read past messages, then let it fade again). The first Enter
        // opened the input; this second Enter would normally re-trigger
        // openInput as a no-op, but instead we reveal the log and skip
        // input. Useful when there's no input race — e.g., user pressed
        // Enter once, input was already debouncing — they can double-tap
        // to just see history.
        showLog(IDLE_FADE_MS);
        lastEnterAt = 0;
        return;
      }
      lastEnterAt = now;
      openInput();
    }
  });

  window.addEventListener('message', function (e) {
    if (!e.data) return;
    if (e.data.type === 'gameState') {
      var s = e.data.state || {};
      if (s.username) localUsername = s.username;
      var mp = s.multiplayer;
      if (mp) {
        if (Array.isArray(mp.chatHistory)) {
          // Only surface the log when the history actually grew. The
          // gameState event fires every frame, so without this check
          // the fade timer would reset 60×/sec and the log would never
          // dim. Initial render (lastHistoryLen=0 → first non-empty
          // history) is allowed to surface so a late joiner sees the
          // backlog briefly before it fades.
          var newLen = mp.chatHistory.length;
          var grew = newLen > lastHistoryLen;
          renderAll(mp.chatHistory);
          if (grew && newLen > 0) showLog(IDLE_FADE_MS);
          lastHistoryLen = newLen;
        }
        if (mp.openChat && !inputRow.classList.contains('open')) openInput();
      }
    } else if (e.data.type === 'chat_append') {
      var m = e.data.message || {};
      var isMe = m.fromUsername === localUsername;
      appendLine(isMe ? 'me' : '',
        '<span class="user">' + escape(m.fromUsername) + ':</span>' +
        '<span class="body">' + escape(m.body) + '</span>');
      // Genuine new message — surface log briefly.
      showLog(IDLE_FADE_MS);
    } else if (e.data.type === 'chat_system') {
      appendLine('sys', '<span class="body">' + escape(e.data.body || '') + '</span>');
      showLog(IDLE_FADE_MS);
    }
  });
})();
</script>
</body>
</html>
