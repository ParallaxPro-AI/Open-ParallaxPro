<!-- description: forces panel with kill count and wave timer — kills, enemy losses, wave countdown, combat statistics -->
<!DOCTYPE html>
<html><head><style>
*{margin:0;padding:0;box-sizing:border-box;}body{font-family:'Inter',system-ui,sans-serif;color:#f0f0f0;pointer-events:none;overflow:hidden;}
.panel{position:fixed;bottom:14px;left:14px;background:rgba(0,0,0,0.5);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.06);border-radius:10px;padding:8px 14px;min-width:120px;}
.pl{font-size:8px;font-weight:700;color:#555;letter-spacing:1px;text-transform:uppercase;margin-bottom:3px;}
.stat{font-size:11px;font-weight:700;color:#888;margin:1px 0;}
.v{color:#22c55e;}.e{color:#ef4444;}
</style></head><body>
<div class="panel"><div class="pl">FORCES</div>
<div class="stat">Kills: <span class="v" id="pk">0</span></div>
<div class="stat">Lost: <span class="e" id="el">0</span></div>
<div class="stat">Next Wave: <span id="nw">—</span>s</div></div>
<script>(function(){function u(s){if(!s)return;if(s.playerKills!==undefined)document.getElementById('pk').textContent=s.playerKills;if(s.enemyKills!==undefined)document.getElementById('el').textContent=s.enemyKills;if(s.nextWave!==undefined)document.getElementById('nw').textContent=s.nextWave;}window.addEventListener('message',function(e){if(e.data&&e.data.type==='gameState')u(e.data.state);});})();
</script></body></html>
