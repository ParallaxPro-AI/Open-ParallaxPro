<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
    color: #eaf0f6;
    background: transparent;
    pointer-events: none;
    overflow: hidden;
  }
  .fps {
    position: fixed; top: 10px; right: 12px;
    display: flex; align-items: baseline; gap: 4px;
    padding: 6px 10px;
    background: rgba(8, 8, 14, 0.55);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 8px;
    font-family: 'Menlo', 'Consolas', monospace;
    font-size: 11px; font-weight: 700;
    letter-spacing: 0.5px;
    backdrop-filter: blur(6px);
  }
  .label { color: #6b7280; font-size: 9px; text-transform: uppercase; letter-spacing: 1px; }
  .value { font-variant-numeric: tabular-nums; min-width: 24px; text-align: right; }
  .v-good { color: #22c55e; }
  .v-mid  { color: #eab308; }
  .v-bad  { color: #ef4444; }
</style>
</head>
<body>
<div class="fps">
  <div class="label">FPS</div>
  <div class="value v-good" id="fps">60</div>
</div>
<script>
(function () {
  var el = document.getElementById('fps');
  function colorFor(v) {
    if (v >= 50) return 'v-good';
    if (v >= 30) return 'v-mid';
    return 'v-bad';
  }
  window.addEventListener('message', function (e) {
    if (!e.data || e.data.type !== 'gameState') return;
    var s = e.data.state || {};
    if (typeof s.fps === 'number') {
      el.textContent = String(s.fps);
      el.className = 'value ' + colorFor(s.fps);
    }
  });
})();
</script>
</body>
</html>
