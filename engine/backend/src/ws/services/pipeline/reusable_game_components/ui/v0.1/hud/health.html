<div id="health-bar" style="position:fixed;bottom:20px;left:20px;pointer-events:none;">
  <div style="font-size:11px;color:#aaa;margin-bottom:2px;">HEALTH</div>
  <div style="width:200px;height:8px;background:rgba(255,255,255,0.1);border-radius:4px;overflow:hidden;">
    <div id="hp-fill" style="width:100%;height:100%;background:linear-gradient(90deg,#22c55e,#4ade80);border-radius:4px;transition:width 0.3s;"></div>
  </div>
  <div id="hp-text" style="font-size:12px;color:#e0e0e0;margin-top:2px;">100</div>
</div>
<script>
function update(state) {
  if (!state) return;
  if (state.health !== undefined) {
    var max = state.maxHealth || 100;
    var pct = Math.max(0, Math.min(100, (state.health / max) * 100));
    var fill = document.getElementById('hp-fill');
    if (fill) {
      fill.style.width = pct + '%';
      fill.style.background = pct > 50 ? 'linear-gradient(90deg,#22c55e,#4ade80)' :
                               pct > 25 ? 'linear-gradient(90deg,#eab308,#facc15)' :
                                          'linear-gradient(90deg,#ef4444,#f87171)';
    }
    var txt = document.getElementById('hp-text');
    if (txt) txt.textContent = Math.round(state.health);
  }
}
window.addEventListener('message', function(e) { if (e.data && e.data.type === 'gameState') update(e.data.state); });
</script>
