<!-- description: tower defense HUD — gold/lives/wave stats plus clickable tower palette, spot selector with prev/next, upgrade/sell, and start-wave button -->
<!DOCTYPE html>
<html>
<head>
<meta name="pp-responsive" content="1">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --glass: rgba(0, 0, 0, 0.5);
    --glass-border: rgba(255, 255, 255, 0.08);
    --text: #f0f0f0;
    --text-dim: #999;
    --gold: #f59e0b;
    --red: #ef4444;
    --green: #22c55e;
    --cyan: #22d3ee;
    --blue: #3b82f6;
    --purple: #a78bfa;
  }
  body {
    font-family: 'Inter', 'SF Pro Display', system-ui, -apple-system, sans-serif;
    color: var(--text);
    pointer-events: none;
    overflow: hidden;
    background: transparent;
    -webkit-font-smoothing: antialiased;
  }

  /* ===== Top stat row ===== */
  .top-bar {
    position: fixed;
    top: 14px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 10px;
    align-items: stretch;
    z-index: 5;
  }
  .stat {
    background: var(--glass);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border: 1px solid var(--glass-border);
    border-radius: 10px;
    padding: 7px 14px;
    display: flex;
    align-items: center;
    gap: 8px;
    min-width: 110px;
    user-select: none;
  }
  .stat .label {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 1.4px;
    text-transform: uppercase;
    color: var(--text-dim);
  }
  .stat .value {
    font-size: 18px;
    font-weight: 800;
    font-variant-numeric: tabular-nums;
    margin-left: auto;
  }
  .stat.gold .value { color: var(--gold); }
  .stat.lives .value { color: var(--red); }
  .stat.wave .value { color: var(--cyan); }
  .stat .alive {
    font-size: 10px;
    color: var(--text-dim);
    margin-left: 8px;
    letter-spacing: 0.8px;
  }

  /* ===== Start wave button (top-right) ===== */
  .start-wave-btn {
    position: fixed;
    top: 14px;
    right: 18px;
    background: linear-gradient(135deg, #16a34a, #15803d);
    border: 2px solid #4ade80;
    border-radius: 10px;
    padding: 10px 18px;
    color: #fff;
    font-size: 13px;
    font-weight: 800;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    cursor: pointer;
    pointer-events: auto;
    box-shadow: 0 0 14px rgba(34, 197, 94, 0.45);
    transition: transform 0.12s ease, filter 0.12s ease;
    user-select: none;
    z-index: 5;
  }
  .start-wave-btn:hover { transform: translateY(-2px); filter: brightness(1.1); }
  .start-wave-btn.disabled {
    background: rgba(40, 40, 40, 0.6);
    border-color: rgba(120, 120, 120, 0.4);
    box-shadow: none;
    cursor: not-allowed;
    color: #888;
  }
  .start-wave-btn.disabled:hover { transform: none; filter: none; }

  /* ===== Tower palette (top-center, below stats) ===== */
  .palette {
    position: fixed;
    top: 70px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 8px;
    background: rgba(0, 0, 0, 0.55);
    backdrop-filter: blur(10px);
    padding: 8px;
    border-radius: 12px;
    border: 1px solid var(--glass-border);
    pointer-events: auto;
    z-index: 5;
  }
  .card {
    width: 78px;
    height: 96px;
    background: linear-gradient(180deg, rgba(40, 40, 50, 0.92), rgba(20, 20, 28, 0.92));
    border: 2px solid rgba(120, 120, 150, 0.4);
    border-radius: 9px;
    position: relative;
    cursor: pointer;
    pointer-events: auto;
    overflow: hidden;
    transition: transform 0.12s ease, filter 0.12s ease, border-color 0.12s ease;
    user-select: none;
  }
  .card:hover { transform: translateY(-3px); border-color: rgba(180, 180, 220, 0.65); }
  .card.disabled { filter: grayscale(0.7) brightness(0.65); cursor: not-allowed; }
  .card.disabled:hover { transform: none; }
  .card.armed {
    border-color: #fde047;
    box-shadow: 0 0 18px rgba(250, 204, 21, 0.7), inset 0 0 18px rgba(250, 204, 21, 0.18);
    transform: translateY(-2px);
  }
  .card.arrow    { box-shadow: inset 0 0 18px rgba(59, 130, 246, 0.18); }
  .card.cannon   { box-shadow: inset 0 0 18px rgba(245, 158, 11, 0.18); }
  .card.ice      { box-shadow: inset 0 0 18px rgba(34, 211, 238, 0.18); }
  .card.lightning{ box-shadow: inset 0 0 18px rgba(167, 139, 250, 0.18); }
  .card .icon-wrap {
    width: 100%;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: 6px;
  }
  .card .icon {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    position: relative;
  }
  .card.arrow    .icon { background: radial-gradient(circle at 35% 30%, #93c5fd, #3b82f6 60%, #1e3a8a 100%); }
  .card.cannon   .icon { background: radial-gradient(circle at 35% 30%, #fde68a, #f59e0b 60%, #78350f 100%); }
  .card.ice      .icon { background: radial-gradient(circle at 35% 30%, #cffafe, #22d3ee 60%, #155e75 100%); }
  .card.lightning .icon { background: radial-gradient(circle at 35% 30%, #ddd6fe, #a78bfa 60%, #4c1d95 100%); }
  .card .name {
    position: absolute;
    bottom: 22px;
    left: 0; right: 0;
    text-align: center;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: #cbd5e1;
  }
  .card .cost {
    position: absolute;
    bottom: 4px; left: 0; right: 0;
    text-align: center;
    font-size: 13px;
    font-weight: 800;
    color: var(--gold);
  }
  .card .key-hint {
    position: absolute;
    top: 3px; left: 5px;
    font-size: 9px;
    font-weight: 700;
    color: rgba(255, 255, 255, 0.55);
    background: rgba(0, 0, 0, 0.45);
    padding: 1px 5px;
    border-radius: 3px;
    letter-spacing: 1px;
  }

  /* ===== Spot selector (bottom-center) ===== */
  .spot-bar {
    position: fixed;
    bottom: 22px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 10px;
    background: rgba(0, 0, 0, 0.6);
    backdrop-filter: blur(10px);
    border: 1px solid var(--glass-border);
    border-radius: 999px;
    padding: 6px 10px;
    z-index: 5;
  }
  .spot-arrow {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.08);
    border: 1px solid rgba(255, 255, 255, 0.18);
    color: var(--text);
    font-size: 18px;
    font-weight: 800;
    cursor: pointer;
    pointer-events: auto;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.12s ease;
    user-select: none;
  }
  .spot-arrow:hover { background: rgba(255, 255, 255, 0.18); }
  .spot-info {
    min-width: 200px;
    text-align: center;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text);
    user-select: none;
  }
  .spot-info .small { font-size: 10px; color: var(--text-dim); display: block; margin-top: 2px; letter-spacing: 0.8px; }
  .spot-action {
    background: rgba(255, 255, 255, 0.08);
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 999px;
    padding: 7px 14px;
    color: var(--text);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    cursor: pointer;
    pointer-events: auto;
    transition: background 0.12s ease;
    user-select: none;
  }
  .spot-action:hover { background: rgba(255, 255, 255, 0.18); }
  .spot-action.upgrade { color: #4ade80; border-color: rgba(74, 222, 128, 0.5); }
  .spot-action.upgrade:hover { background: rgba(74, 222, 128, 0.18); }
  .spot-action.sell { color: #fbbf24; border-color: rgba(251, 191, 36, 0.5); }
  .spot-action.sell:hover { background: rgba(251, 191, 36, 0.18); }
  .spot-action.disabled { opacity: 0.35; cursor: not-allowed; }
  .spot-action.disabled:hover { background: rgba(255, 255, 255, 0.08); }

  /* ===== Hint bar ===== */
  .hint {
    position: fixed;
    bottom: 78px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 1.2px;
    text-transform: uppercase;
    pointer-events: none;
    user-select: none;
    z-index: 4;
  }
  .hint.armed {
    color: #fde047;
    font-weight: 800;
    font-size: 11px;
    text-shadow: 0 0 8px rgba(250, 204, 21, 0.45);
  }
  body.armed { cursor: crosshair; }
</style>
</head>
<body>

<div class="top-bar">
  <div class="stat gold"><span class="label">Gold</span><span class="value" id="gold">500</span></div>
  <div class="stat lives"><span class="label">Lives</span><span class="value" id="lives">20</span></div>
  <div class="stat wave"><span class="label">Wave</span><span class="value" id="wave">0/10</span><span class="alive" id="alive"></span></div>
</div>

<!-- data-interactive markers below let the mobile-controls overlay
     synth-click these on touch devices. The desktop click path runs
     unchanged via the addEventListener('click') wiring in the script
     block below. -->
<div class="start-wave-btn" id="startWaveBtn" data-interactive>Start Wave</div>

<div class="palette" id="palette">
  <div class="card arrow" data-type="arrow" data-interactive>
    <span class="key-hint" data-pp-desktop-only>1</span>
    <div class="icon-wrap"><div class="icon"></div></div>
    <div class="name">Arrow</div>
    <div class="cost" id="cost-arrow">100</div>
  </div>
  <div class="card cannon" data-type="cannon" data-interactive>
    <span class="key-hint" data-pp-desktop-only>2</span>
    <div class="icon-wrap"><div class="icon"></div></div>
    <div class="name">Cannon</div>
    <div class="cost" id="cost-cannon">200</div>
  </div>
  <div class="card ice" data-type="ice" data-interactive>
    <span class="key-hint" data-pp-desktop-only>3</span>
    <div class="icon-wrap"><div class="icon"></div></div>
    <div class="name">Ice</div>
    <div class="cost" id="cost-ice">150</div>
  </div>
  <div class="card lightning" data-type="lightning" data-interactive>
    <span class="key-hint" data-pp-desktop-only>4</span>
    <div class="icon-wrap"><div class="icon"></div></div>
    <div class="name">Bolt</div>
    <div class="cost" id="cost-lightning">300</div>
  </div>
</div>

<div class="hint" id="hint">Click a tower, then click a spot in the world. Or Q/E + 1-4. Right-click / Esc to cancel.</div>

<div class="spot-bar">
  <div class="spot-arrow" id="spotPrev" data-interactive>&#9664;</div>
  <div class="spot-info">
    <span id="spotLabel">Spot 1 / 12</span>
    <span class="small" id="spotDetail">empty</span>
  </div>
  <div class="spot-arrow" id="spotNext" data-interactive>&#9654;</div>
  <div class="spot-action upgrade disabled" id="upgradeBtn" data-interactive>Upgrade</div>
  <div class="spot-action sell disabled" id="sellBtn" data-interactive>Sell</div>
</div>

<script>
(function () {
  function send(action, payload) {
    window.parent.postMessage({
      type: 'game_command',
      action: action,
      panel: 'hud/td_hud',
      payload: payload || {}
    }, '*');
  }

  var goldEl = document.getElementById('gold');
  var livesEl = document.getElementById('lives');
  var waveEl = document.getElementById('wave');
  var aliveEl = document.getElementById('alive');
  var palette = document.getElementById('palette');
  var startBtn = document.getElementById('startWaveBtn');
  var hintEl = document.getElementById('hint');
  var spotPrev = document.getElementById('spotPrev');
  var spotNext = document.getElementById('spotNext');
  var spotLabel = document.getElementById('spotLabel');
  var spotDetail = document.getElementById('spotDetail');
  var upgradeBtn = document.getElementById('upgradeBtn');
  var sellBtn = document.getElementById('sellBtn');

  var cardEls = {};
  var costEls = {};
  ['arrow', 'cannon', 'ice', 'lightning'].forEach(function (k) {
    cardEls[k] = palette.querySelector('.card[data-type="' + k + '"]');
    costEls[k] = document.getElementById('cost-' + k);
    cardEls[k].addEventListener('click', function () {
      if (cardEls[k].classList.contains('disabled')) return;
      send('build_tower', { type: k });
    });
  });

  startBtn.addEventListener('click', function () {
    if (startBtn.classList.contains('disabled')) return;
    send('start_wave');
  });
  spotPrev.addEventListener('click', function () { send('spot_prev'); });
  spotNext.addEventListener('click', function () { send('spot_next'); });
  upgradeBtn.addEventListener('click', function () {
    if (upgradeBtn.classList.contains('disabled')) return;
    send('upgrade_tower');
  });
  sellBtn.addEventListener('click', function () {
    if (sellBtn.classList.contains('disabled')) return;
    send('sell_tower');
  });

  function render(state) {
    if (!state) return;
    goldEl.textContent = String(state.gold || 0);
    livesEl.textContent = String(state.lives || 0);
    waveEl.textContent = (state.wave || 0) + '/' + (state.totalWaves || 10);

    if (state.waveActive) {
      aliveEl.textContent = (state.enemyCount || 0) + ' afield · ' + (state.spawnRemaining || 0) + ' incoming';
      startBtn.classList.add('disabled');
      startBtn.textContent = 'Wave In Progress';
    } else {
      aliveEl.textContent = (state.wave || 0) >= (state.totalWaves || 10) ? '' : 'lull before next wave';
      startBtn.classList.remove('disabled');
      startBtn.textContent = (state.wave || 0) === 0 ? 'Start First Wave' : 'Start Next Wave';
    }

    // Towers — affordability + cost. Highlight the armed card.
    var armed = state.armedTower || '';
    var towers = state.towers || [];
    for (var i = 0; i < towers.length; i++) {
      var t = towers[i];
      var el = cardEls[t.type];
      if (!el) continue;
      costEls[t.type].textContent = String(t.cost);
      el.classList.toggle('disabled', !t.affordable);
      el.classList.toggle('armed', t.type === armed);
    }

    // Hint bar reflects armed mode.
    if (armed) {
      hintEl.textContent = '⚡ Click a spot in the world to place ' + armed.toUpperCase() + '. Right-click / Esc to cancel.';
      hintEl.classList.add('armed');
      document.body.classList.add('armed');
    } else {
      hintEl.textContent = 'Click a tower, then click a spot in the world. Or Q/E + 1-4. Right-click / Esc to cancel.';
      hintEl.classList.remove('armed');
      document.body.classList.remove('armed');
    }

    // Spot info bar.
    spotLabel.textContent = 'Spot ' + (state.selectedSpot || 1) + ' / ' + (state.totalSpots || 12);
    var info = state.towerInfo;
    if (info) {
      spotDetail.textContent = info.type + ' L' + info.level +
        (info.canUpgrade ? ' · upg ' + info.upgradeCost + 'g' : ' · maxed') +
        ' · sell ' + info.sellValue + 'g';
      upgradeBtn.classList.toggle('disabled', !info.canUpgrade || (state.gold || 0) < (info.upgradeCost || 0));
      sellBtn.classList.remove('disabled');
    } else {
      spotDetail.textContent = state.spotOccupied ? 'occupied' : 'empty';
      upgradeBtn.classList.add('disabled');
      sellBtn.classList.add('disabled');
    }
  }

  window.addEventListener('message', function (e) {
    if (!e.data || e.data.type !== 'gameState') return;
    render(e.data.state);
  });
})();
</script>
</body>
</html>
