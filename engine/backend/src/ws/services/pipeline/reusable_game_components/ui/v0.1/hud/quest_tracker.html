<!DOCTYPE html>
<html><head><style>
*{margin:0;padding:0;box-sizing:border-box;}body{font-family:'Inter',system-ui,sans-serif;color:#f0f0f0;pointer-events:none;overflow:hidden;}
.qt{position:fixed;top:14px;right:14px;background:rgba(0,0,0,0.45);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.06);border-radius:10px;padding:8px 14px;min-width:120px;}
.qt-label{font-size:8px;font-weight:700;color:#555;letter-spacing:2px;text-transform:uppercase;margin-bottom:3px;}
.qt-val{font-size:12px;font-weight:700;color:#f59e0b;}.qt-done{font-size:10px;color:#22c55e;margin-top:2px;}
.qt-gold{font-size:11px;color:#f59e0b;margin-top:4px;}
</style></head><body>
<div class="qt">
  <div class="qt-label">QUESTS</div>
  <div class="qt-val">Active: <span id="aq">0</span></div>
  <div class="qt-done">Done: <span id="cq">0</span></div>
  <div class="qt-gold">Gold: <span id="gold">0</span></div>
</div>
<script>(function(){function u(s){if(!s)return;
if(s.activeQuests!==undefined)document.getElementById('aq').textContent=s.activeQuests;
if(s.completedQuests!==undefined)document.getElementById('cq').textContent=s.completedQuests;
if(s.gold!==undefined)document.getElementById('gold').textContent=s.gold;
}window.addEventListener('message',function(e){if(e.data&&e.data.type==='gameState')u(e.data.state);});})();
</script></body></html>
