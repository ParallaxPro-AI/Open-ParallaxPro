<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --panel: rgba(255, 255, 255, 0.12);
    --panel-border: rgba(255, 255, 255, 0.15);
    --text: #fff;
    --text-dim: rgba(255, 255, 255, 0.6);
    --gold: #fbbf24;
    --gold-glow: rgba(251, 191, 36, 0.3);
    --red: #f87171;
    --red-dim: rgba(248, 113, 113, 0.2);
    --purple: #c084fc;
    --purple-glow: rgba(192, 132, 252, 0.3);
    --sky: #60a5fa;
  }

  body {
    font-family: 'Inter', 'SF Pro Rounded', system-ui, -apple-system, sans-serif;
    color: var(--text);
    pointer-events: none;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ===== LIVES ===== */
  .lives-panel {
    position: fixed;
    top: 16px;
    left: 16px;
    background: var(--panel);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid var(--panel-border);
    border-radius: 16px;
    padding: 10px 16px;
    display: flex;
    gap: 5px;
    align-items: center;
  }

  .heart {
    font-size: 24px;
    transition: all 0.3s ease;
    filter: drop-shadow(0 0 4px var(--red-dim));
  }

  .heart.empty {
    opacity: 0.2;
    filter: none;
  }

  @keyframes heartPop {
    0% { transform: scale(1); }
    50% { transform: scale(1.3); }
    100% { transform: scale(1); }
  }

  .heart.pop {
    animation: heartPop 0.3s ease;
  }

  /* ===== COINS ===== */
  .coins-panel {
    position: fixed;
    top: 16px;
    right: 16px;
    background: var(--panel);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid var(--panel-border);
    border-radius: 16px;
    padding: 10px 18px;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 4px;
  }

  .coins-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .coin-icon {
    font-size: 20px;
    filter: drop-shadow(0 0 6px var(--gold-glow));
  }

  .coin-count {
    font-size: 24px;
    font-weight: 800;
    color: var(--gold);
    font-variant-numeric: tabular-nums;
    text-shadow: 0 0 12px var(--gold-glow);
    min-width: 35px;
    text-align: right;
  }

  .score-row {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .score-icon {
    font-size: 14px;
    color: var(--purple);
    filter: drop-shadow(0 0 4px var(--purple-glow));
  }

  .score-value {
    font-size: 16px;
    font-weight: 700;
    color: var(--purple);
    font-variant-numeric: tabular-nums;
    text-shadow: 0 0 8px var(--purple-glow);
  }

  /* ===== COIN COLLECT FLASH ===== */
  .collect-flash {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 28px;
    font-weight: 900;
    color: var(--gold);
    opacity: 0;
    pointer-events: none;
    text-shadow: 0 0 20px var(--gold-glow);
  }

  @keyframes collectPop {
    0% { opacity: 1; transform: translate(-50%, -50%) scale(0.5); }
    50% { opacity: 1; transform: translate(-50%, -70%) scale(1.1); }
    100% { opacity: 0; transform: translate(-50%, -90%) scale(0.8); }
  }
</style>
</head>
<body>

<!-- Lives -->
<div class="lives-panel" id="lives-panel">
  <span class="heart" id="h1">&#10084;</span>
  <span class="heart" id="h2">&#10084;</span>
  <span class="heart" id="h3">&#10084;</span>
  <span class="heart empty" id="h4">&#10084;</span>
  <span class="heart empty" id="h5">&#10084;</span>
</div>

<!-- Coins & Score -->
<div class="coins-panel">
  <div class="coins-row">
    <span class="coin-icon">&#11044;</span>
    <span class="coin-count" id="coin-count">0</span>
  </div>
  <div class="score-row">
    <span class="score-icon">&#9733;</span>
    <span class="score-value" id="score-value">0</span>
  </div>
</div>

<script>
(function() {
  var lastCoins = 0;
  var lastLives = 3;

  function update(state) {
    if (!state) return;

    if (state.lives !== undefined) {
      for (var i = 1; i <= 5; i++) {
        var h = document.getElementById('h' + i);
        if (!h) continue;
        if (i <= state.lives) {
          h.className = 'heart';
          if (state.lives > lastLives && i === state.lives) {
            h.className = 'heart pop';
          }
        } else {
          h.className = 'heart empty';
        }
      }
      lastLives = state.lives;
    }

    if (state.coins !== undefined) {
      document.getElementById('coin-count').textContent = state.coins;
      if (state.coins > lastCoins && lastCoins >= 0) {
        var el = document.getElementById('coin-count');
        el.style.transform = 'scale(1.2)';
        setTimeout(function() { el.style.transform = 'scale(1)'; }, 150);
      }
      lastCoins = state.coins;
    }

    if (state.score !== undefined) {
      document.getElementById('score-value').textContent = state.score.toLocaleString();
    }
  }

  window.addEventListener('message', function(e) {
    if (e.data && e.data.type === 'gameState') update(e.data.state);
  });
})();
</script>
</body>
</html>
