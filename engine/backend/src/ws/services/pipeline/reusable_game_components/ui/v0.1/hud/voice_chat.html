<!-- description: voice chat control panel with microphone toggle and status — voice control, mic button, audio communication, voice toggle -->
<!DOCTYPE html>
<html>
<head>
<meta name="pp-responsive" content="1">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
    color: #eaf0f6;
    background: transparent;
    pointer-events: none;
    overflow: hidden;
  }
  .panel {
    /* Pulled down from top:115 → 195 (stays 35px below ping per the
       prior layout) so per-game HUDs have unobstructed top-left.
       z-index 150 — above every shipped HUD layer (max 100 in
       soccer/banner_siege), below modal overlays (pause_menu 250,
       wasted 300, game_over 200). Background alpha 0.55 → 0.3 so the
       game shows through behind the panel. */
    position: fixed; top: 195px; left: 12px; z-index: 150;
    min-width: 170px;
    background: rgba(8,8,14,0.3);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 10px;
    padding: 8px;
    backdrop-filter: blur(6px);
    pointer-events: auto;
  }
  .panel.hidden { display: none; }
  .title-row {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 6px;
  }
  .title {
    font-size: 10px; font-weight: 700;
    letter-spacing: 1.5px; text-transform: uppercase;
    color: #6b7280;
  }
  .mic-toggle {
    font-family: inherit;
    font-size: 10px; font-weight: 700;
    letter-spacing: 1px; text-transform: uppercase;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    color: #eaf0f6;
    padding: 4px 8px;
    border-radius: 6px;
    cursor: pointer;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .mic-toggle:hover { border-color: rgba(255,255,255,0.2); }
  .mic-toggle.on {
    background: rgba(99,102,241,0.25);
    border-color: #6366f1;
  }
  .mic-toggle.muted {
    background: rgba(239,68,68,0.2);
    border-color: rgba(239,68,68,0.5);
  }
  .kbd {
    display: inline-block;
    min-width: 14px;
    padding: 1px 4px;
    font-size: 9px; font-weight: 700;
    letter-spacing: 0;
    line-height: 1;
    text-align: center;
    color: rgba(255,255,255,0.85);
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    border-bottom-width: 2px;
    border-radius: 3px;
  }

  .peers { display: flex; flex-direction: column; gap: 4px; }
  .peer {
    display: flex; align-items: center; gap: 8px;
    padding: 4px 6px;
    border-radius: 6px;
    font-size: 11px;
    transition: background 0.15s;
  }
  .peer.speaking { background: rgba(34,197,94,0.15); }
  .peer .name { flex: 1; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .peer .meter { display: flex; gap: 2px; align-items: flex-end; }
  .peer .bar {
    width: 3px;
    background: rgba(255,255,255,0.1);
    border-radius: 1px;
    transition: background 0.05s, height 0.05s;
  }
  .peer .bar.on { background: #22c55e; }
  .peer .bar.hot { background: #eab308; }
  .peer .bar.max { background: #ef4444; }

  /* Mobile (touch primary): pull up close to ping (which moves to ~48px
     on mobile), hide the "VOICE" title label (the mic button itself is
     self-explanatory), drop padding, drop BG opacity. Saves ~20-25px of
     vertical real estate vs the desktop layout. */
  @media (pointer: coarse) {
    .panel {
      top: max(82px, calc(env(safe-area-inset-top) + 42px));
      left: max(8px, env(safe-area-inset-left));
      min-width: 140px;
      padding: 5px 6px;
      opacity: 0.92;
      background: rgba(8, 8, 14, 0.22);
    }
    .title-row { margin-bottom: 4px; }
    .title { display: none; }
    /* Override the engine's 44x44 tap-target floor for the mic toggle —
       Apple's HIG min applies to PRIMARY actions, and the mic toggle is
       secondary status info. !important is required because the engine's
       base CSS uses :root[data-pp-responsive] button which has higher
       specificity than a class selector. Forces the button to size to
       its content (~22px tall) so the panel doesn't waste 25+ vertical
       pixels. */
    .mic-toggle {
      min-height: 0 !important;
      min-width: 0 !important;
      font-size: 9px;
      padding: 3px 7px;
      line-height: 1.2;
    }
    .peer { padding: 3px 5px; font-size: 10px; }
    /* Hide the [V] keyboard hint — mobile players have the mic button
       itself, no keyboard shortcut to advertise. */
    .mic-toggle .kbd { display: none; }
    /* Inline ping pill, shown only on mobile. Replaces the standalone
       ping HUD (hidden via @media in ping.html) so mobile players see
       one consolidated comm widget. */
    .inline-ping {
      display: inline-flex !important;
      align-items: baseline;
      gap: 3px;
      margin-left: auto;
      padding: 0 4px;
      font-family: 'Menlo', 'Consolas', monospace;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }
    .inline-ping .p-label { color: #eaf0f6; font-size: 8px; text-transform: uppercase; letter-spacing: 1px; }
    .inline-ping .p-val { font-variant-numeric: tabular-nums; min-width: 22px; text-align: right; }
    .inline-ping .p-unit { color: #eaf0f6; font-size: 8px; }
    .inline-ping.disconnected .p-val { color: #ef4444; }
    .inline-ping .v-good { color: #22c55e; }
    .inline-ping .v-mid  { color: #eab308; }
    .inline-ping .v-bad  { color: #ef4444; }
  }
  .inline-ping { display: none; }  /* desktop: hidden, standalone ping HUD owns it */
</style>
</head>
<body>
<div class="panel hidden" id="panel">
  <div class="title-row">
    <div class="title">Voice</div>
    <button class="mic-toggle" id="mic-toggle">Mic off</button>
    <div class="inline-ping" id="inline-ping">
      <span class="p-label">PING</span>
      <span class="p-val v-good" id="inline-ping-val">—</span>
      <span class="p-unit">ms</span>
    </div>
  </div>
  <div class="peers" id="peers"></div>
</div>
<script>
(function () {
  function __cp(n){try{if(window.parent&&window.parent.ppCheckpoint)window.parent.ppCheckpoint('voice_chat: '+n);}catch(_){}}
  __cp('script booted');
  var micToggle = document.getElementById('mic-toggle');
  var peersEl = document.getElementById('peers');
  var panel = document.getElementById('panel');
  var micOn = false;
  var muted = false;

  function emit(action, payload) {
    var msg = { type: 'game_command', action: action, panel: 'hud/voice_chat' };
    if (payload) msg.payload = payload;
    window.parent.postMessage(msg, '*');
  }

  function escapeHtml(s) {
    return String(s || '').replace(/[&<>"']/g, function (c) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
    });
  }

  function updateMicButton() {
    micToggle.classList.remove('on', 'muted');
    // Two visible states: "Mic on" (green-ish indigo, audible) and
    // "Muted" (red, not transmitting). Mic-off and mic-on-but-muted both
    // read as "Muted" from the listener's perspective — collapsing them
    // keeps the UI binary and avoids the "is muted the same as off?"
    // question.
    var label;
    if (micOn && !muted) {
      micToggle.classList.add('on');
      label = 'Mic on';
    } else {
      micToggle.classList.add('muted');
      label = 'Muted';
    }
    micToggle.innerHTML = '<span>' + label + '</span><span class="kbd">V</span>';
  }

  micToggle.onclick = function () {
    if (!micOn) {
      emit('voice_request_mic');
    } else if (!muted) {
      muted = true;
      emit('voice_set_muted', { muted: true });
      updateMicButton();
    } else {
      muted = false;
      emit('voice_set_muted', { muted: false });
      updateMicButton();
    }
  };

  function renderPeers(peers, mpEnabled) {
    peersEl.innerHTML = '';
    // When multiplayer is enabled keep the panel visible even with no
    // peers — on mobile the inline ping (in title-row) still wants a
    // host to render in. On desktop the panel only carries the mic
    // toggle, which is also fine to show in singleplayer-host mode.
    if (!peers || !peers.length) {
      if (!mpEnabled) { panel.classList.add('hidden'); return; }
      panel.classList.remove('hidden');
      return;
    }
    panel.classList.remove('hidden');
    peers.forEach(function (p) {
      var row = document.createElement('div');
      // The raw RMS level from the analyser is quiet (typical speech maxes
      // around 0.2). Take sqrt to stretch the useful range and amplify so
      // the meter actually moves when someone talks. Clamp at 1.
      var raw = Number(p.level || 0);
      var lvl = Math.min(1, Math.sqrt(raw) * 1.8);
      var speaking = lvl > 0.08;
      row.className = 'peer' + (speaking ? ' speaking' : '');

      var BARS = 8;
      var bars = '';
      for (var i = 0; i < BARS; i++) {
        var t = (i + 1) / BARS;               // threshold 0.125 .. 1.0
        var on = lvl >= t;
        var cls = on
          ? (i >= BARS - 2 ? 'max' : (i >= BARS - 4 ? 'hot' : 'on'))
          : '';
        // Height grows linearly so the meter has a visible shape even at
        // low amplitudes.
        var h = 4 + Math.round((i / (BARS - 1)) * 10);
        bars += '<div class="bar ' + cls + '" style="height:' + h + 'px"></div>';
      }
      row.innerHTML =
        '<div class="name">' + escapeHtml(p.username) + '</div>' +
        '<div class="meter">' + bars + '</div>';
      peersEl.appendChild(row);
    });
  }

  // Inline ping (mobile-only via CSS). Same color thresholds as the
  // standalone ping HUD: <80 good, <150 mid, >=150 bad. Hidden via
  // @media on desktop so the standalone ping HUD owns the display.
  var inlinePing = document.getElementById('inline-ping');
  var inlinePingVal = document.getElementById('inline-ping-val');
  function pingColorFor(ms) {
    if (ms < 0) return 'v-bad';
    if (ms < 80) return 'v-good';
    if (ms < 150) return 'v-mid';
    return 'v-bad';
  }

  window.addEventListener('message', function (e) {
    if (!e.data || e.data.type !== 'gameState') return;
    var mp = (e.data.state || {}).multiplayer || {};
    if (typeof mp.micOn === 'boolean') micOn = mp.micOn;
    if (typeof mp.muted === 'boolean') muted = mp.muted;
    updateMicButton();
    renderPeers(mp.voicePeers || [], !!mp.enabled);
    // Inline ping update
    if (mp.enabled) {
      inlinePing.classList.toggle('disconnected', mp.connected === false);
      var pms = typeof mp.ping === 'number' ? mp.ping : -1;
      inlinePingVal.textContent = pms < 0 ? '—' : String(Math.round(pms));
      inlinePingVal.className = 'p-val ' + pingColorFor(pms);
    }
  });

  updateMicButton();
})();
</script>
</body>
</html>
