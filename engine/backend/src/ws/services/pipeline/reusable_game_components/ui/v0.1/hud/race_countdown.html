<!-- description: race start countdown timer with large animated numbers and go indicator — also: race timer, countdown display, race start, launch countdown, start timer -->
<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', 'SF Pro Display', system-ui, -apple-system, sans-serif;
    pointer-events: none;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  .countdown-overlay {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .count-item {
    position: absolute;
    opacity: 0;
    transform: scale(2.5);
  }

  .count-num {
    font-size: 200px;
    font-weight: 900;
    color: #fff;
    line-height: 1;
    text-shadow:
      0 0 80px rgba(249, 115, 22, 0.6),
      0 0 40px rgba(249, 115, 22, 0.3),
      0 4px 20px rgba(0, 0, 0, 0.5);
  }

  .count-go {
    font-size: 160px;
    font-weight: 900;
    color: #22c55e;
    line-height: 1;
    letter-spacing: 12px;
    text-shadow:
      0 0 80px rgba(34, 197, 94, 0.7),
      0 0 40px rgba(34, 197, 94, 0.4),
      0 4px 20px rgba(0, 0, 0, 0.5);
  }

  /* Flash ring behind number */
  .flash-ring {
    position: absolute;
    width: 300px;
    height: 300px;
    border-radius: 50%;
    border: 3px solid rgba(249, 115, 22, 0.3);
    opacity: 0;
  }

  .flash-ring.go {
    border-color: rgba(34, 197, 94, 0.3);
  }

  @keyframes countPulse {
    0% {
      opacity: 0;
      transform: scale(2.5);
    }
    15% {
      opacity: 1;
      transform: scale(1);
    }
    50% {
      opacity: 1;
      transform: scale(1.02);
    }
    85% {
      opacity: 0.8;
      transform: scale(0.95);
    }
    100% {
      opacity: 0;
      transform: scale(0.8);
    }
  }

  @keyframes goPulse {
    0% {
      opacity: 0;
      transform: scale(3) rotate(-3deg);
    }
    20% {
      opacity: 1;
      transform: scale(1) rotate(0deg);
    }
    60% {
      opacity: 1;
      transform: scale(1.05) rotate(0deg);
    }
    100% {
      opacity: 0;
      transform: scale(1.3) rotate(0deg);
    }
  }

  @keyframes ringPulse {
    0% {
      opacity: 0.8;
      transform: scale(0.5);
    }
    100% {
      opacity: 0;
      transform: scale(2.5);
    }
  }

  /* Subtle vignette during countdown */
  .vignette {
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.3) 100%);
    opacity: 0;
    transition: opacity 0.5s ease;
  }

  .vignette.active {
    opacity: 1;
  }
</style>
</head>
<body>

<div class="vignette active" id="vignette"></div>

<div class="countdown-overlay">
  <div class="flash-ring" id="ring3"></div>
  <div class="count-item" id="num3"><span class="count-num">3</span></div>

  <div class="flash-ring" id="ring2"></div>
  <div class="count-item" id="num2"><span class="count-num">2</span></div>

  <div class="flash-ring" id="ring1"></div>
  <div class="count-item" id="num1"><span class="count-num">1</span></div>

  <div class="flash-ring go" id="ringGo"></div>
  <div class="count-item" id="numGo"><span class="count-go">GO!</span></div>
</div>

<script>
(function() {
  function animateCount(numId, ringId, delay) {
    setTimeout(function() {
      var el = document.getElementById(numId);
      var ring = document.getElementById(ringId);
      if (el) el.style.animation = 'countPulse 0.9s cubic-bezier(0.16, 1, 0.3, 1) forwards';
      if (ring) ring.style.animation = 'ringPulse 0.9s ease-out forwards';
    }, delay);
  }

  animateCount('num3', 'ring3', 200);
  animateCount('num2', 'ring2', 1200);
  animateCount('num1', 'ring1', 2200);

  // GO! with special animation
  setTimeout(function() {
    var go = document.getElementById('numGo');
    var ring = document.getElementById('ringGo');
    if (go) go.style.animation = 'goPulse 1s cubic-bezier(0.16, 1, 0.3, 1) forwards';
    if (ring) ring.style.animation = 'ringPulse 1s ease-out forwards';

    // Fade vignette
    var vig = document.getElementById('vignette');
    if (vig) vig.classList.remove('active');
  }, 3200);
})();
</script>
</body>
</html>
