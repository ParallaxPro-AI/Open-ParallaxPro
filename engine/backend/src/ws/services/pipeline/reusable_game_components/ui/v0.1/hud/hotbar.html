<!-- description: quick-access action bar with nine slots showing items and keybindings — inventory bar, quick items, hotkeys, equipment slots, action bar -->
<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', system-ui, sans-serif; color: #f0f0f0; pointer-events: none; overflow: hidden; }
  .hotbar {
    position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 3px; background: rgba(0,0,0,0.5);
    backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.06);
    border-radius: 8px; padding: 4px;
  }
  .slot {
    width: 40px; height: 40px; background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08); border-radius: 4px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    position: relative; font-size: 9px; font-weight: 700; color: #888;
    text-transform: capitalize;
    cursor: pointer; pointer-events: auto; user-select: none;
    transition: border-color 0.12s, background 0.12s;
  }
  .slot:hover { border-color: rgba(255,255,255,0.25); background: rgba(255,255,255,0.08); }
  .slot.selected { border-color: #22d3ee; box-shadow: 0 0 8px rgba(34,211,238,0.3); background: rgba(34,211,238,0.08); }
  .slot-count { position: absolute; bottom: 1px; right: 3px; font-size: 8px; color: #ccc; font-weight: 800; }
  .slot-key { position: absolute; top: 1px; left: 3px; font-size: 7px; color: #555; }
  .slot-name { font-size: 7px; color: #aaa; text-align: center; line-height: 1; max-width: 36px; overflow: hidden; }
</style>
</head>
<body>
<div class="hotbar" id="hotbar"></div>
<script>
(function(){
  function send(action, payload){
    window.parent.postMessage({
      type:'game_command', action:action, panel:'hud/hotbar', payload:payload||{}
    }, '*');
  }
  var hotbar = document.getElementById('hotbar');
  // Init 9 slots
  for(var i=0;i<9;i++){
    var slot=document.createElement('div');
    slot.className='slot';
    slot.id='slot-'+i;
    slot.setAttribute('data-interactive','');
    slot.innerHTML='<span class="slot-key">'+(i+1)+'</span><span class="slot-name" id="sn-'+i+'"></span><span class="slot-count" id="sc-'+i+'"></span>';
    (function(idx){
      slot.addEventListener('click', function(){ send('select_slot', { slot: idx }); });
    })(i);
    hotbar.appendChild(slot);
  }
  function update(s){if(!s)return;
    if(s.inventory){
      for(var i=0;i<9;i++){
        var inv=s.inventory[i]||{item:'',count:0};
        document.getElementById('sn-'+i).textContent=inv.item?inv.item.replace(/_/g,' '):'';
        document.getElementById('sc-'+i).textContent=inv.count>1?inv.count:'';
      }
    }
    if(s.selectedSlot!==undefined){
      for(var i=0;i<9;i++){
        var el=document.getElementById('slot-'+i);
        if(el)el.className='slot'+(i===s.selectedSlot?' selected':'');
      }
    }
  }
  window.addEventListener('message',function(e){if(e.data&&e.data.type==='gameState')update(e.data.state);});
})();
</script>
</body>
</html>
