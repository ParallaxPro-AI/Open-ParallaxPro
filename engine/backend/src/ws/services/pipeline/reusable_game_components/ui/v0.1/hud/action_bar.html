<!-- description: Bottom-center ability slots Q E R with cooldown timers — action slots, ability buttons, skill readiness, hotkey display, spell cooldown timer -->
<!DOCTYPE html>
<html><head>
<meta name="pp-responsive" content="1"><style>
*{margin:0;padding:0;box-sizing:border-box;}body{font-family:'Inter',system-ui,sans-serif;color:#f0f0f0;pointer-events:none;overflow:hidden;}
.ab{position:fixed;bottom:10px;left:50%;transform:translateX(-50%);display:flex;gap:4px;background:rgba(0,0,0,0.5);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.06);border-radius:8px;padding:4px;}
.slot{width:44px;height:44px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:4px;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;}
.slot-key{position:absolute;top:1px;left:3px;font-size:7px;color:#555;font-weight:700;}
.slot-name{font-size:8px;color:#aaa;font-weight:600;}
.slot-cd{position:absolute;bottom:1px;right:3px;font-size:8px;font-weight:800;color:#ef4444;}
.slot.ready{border-color:rgba(59,130,246,0.3);}
</style></head><body>
<div class="ab">
  <div class="slot" id="s-q"><span class="slot-key">Q</span><span class="slot-name">Burst</span><span class="slot-cd" id="cd-q"></span></div>
  <div class="slot" id="s-e"><span class="slot-key">E</span><span class="slot-name">Heal</span><span class="slot-cd" id="cd-e"></span></div>
  <div class="slot" id="s-r"><span class="slot-key">R</span><span class="slot-name">Ult</span><span class="slot-cd" id="cd-r"></span></div>
</div>
<script>(function(){function u(s){if(!s)return;
var keys=['q','e','r'];for(var i=0;i<keys.length;i++){var k=keys[i];var cd=s[k+'Cooldown'];
var el=document.getElementById('cd-'+k);var sl=document.getElementById('s-'+k);
if(cd!==undefined){if(cd>0){if(el)el.textContent=cd+'s';if(sl)sl.className='slot';}
else{if(el)el.textContent='';if(sl)sl.className='slot ready';}}}
}window.addEventListener('message',function(e){if(e.data&&e.data.type==='gameState')u(e.data.state);});})();
</script></body></html>
