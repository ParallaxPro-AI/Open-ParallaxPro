<!-- description: Neon round indicator with player status dot and countdown banner — round counter, match status, alive indicator, waiting room, round timer -->
<!DOCTYPE html>
<html>
<head>
<meta name="pp-responsive" content="1">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
    color: #eaf6ff;
    background: transparent;
    pointer-events: none;
    overflow: hidden;
  }
  .wrap {
    position: fixed; top: 70px; left: 50%;
    transform: translateX(-50%);
    text-align: center;
    pointer-events: none;
    user-select: none;
  }
  .wrap.hidden { display: none; }
  .round-pill {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 5px 12px;
    background: rgba(2, 6, 18, 0.62);
    border: 1px solid rgba(80, 180, 255, 0.18);
    border-radius: 999px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    color: #9fc6f0;
    text-transform: uppercase;
    backdrop-filter: blur(6px);
  }
  .round-pill .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #2ed3ff;
    box-shadow: 0 0 10px rgba(46, 211, 255, 0.7);
    animation: pulse 1.4s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.55; transform: scale(0.85); }
  }
  .alive-line {
    margin-top: 6px;
    font-size: 10px;
    color: #4fa1d6;
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }

  /* Big centered countdown / banner */
  .banner-wrap {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }
  .banner {
    font-size: 96px;
    font-weight: 900;
    letter-spacing: 14px;
    color: #9ce8ff;
    text-shadow:
      0 0 30px rgba(80, 220, 255, 0.7),
      0 0 80px rgba(40, 130, 220, 0.4),
      0 4px 12px rgba(0, 0, 0, 0.6);
    opacity: 0;
    transform: scale(1.4);
    transition: none;
  }
  .banner.show {
    animation: bannerPop 0.5s cubic-bezier(0.2, 0.9, 0.3, 1) forwards;
  }
  .banner.go {
    color: #b1ff9c;
    text-shadow:
      0 0 30px rgba(120, 255, 110, 0.85),
      0 0 90px rgba(60, 200, 80, 0.55),
      0 4px 14px rgba(0, 0, 0, 0.6);
  }
  .banner.winner {
    color: #ffd166;
    font-size: 64px;
    letter-spacing: 8px;
    text-shadow:
      0 0 30px rgba(255, 200, 80, 0.85),
      0 0 90px rgba(255, 150, 30, 0.55),
      0 4px 14px rgba(0, 0, 0, 0.6);
  }
  @keyframes bannerPop {
    0% { opacity: 0; transform: scale(1.5) translateY(-8px); filter: blur(8px); }
    35% { filter: blur(0); }
    100% { opacity: 1; transform: scale(1) translateY(0); filter: blur(0); }
  }
  .banner-sub {
    position: absolute;
    bottom: -36px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 13px;
    letter-spacing: 4px;
    color: rgba(200, 230, 255, 0.55);
    text-transform: uppercase;
    white-space: nowrap;
  }
</style>
</head>
<body>
<div class="wrap hidden" id="wrap">
  <div class="round-pill">
    <span class="dot"></span>
    <span id="roundLabel">Round 1</span>
  </div>
  <div class="alive-line" id="aliveLine">— alive —</div>
</div>

<div class="banner-wrap">
  <div class="banner" id="banner" style="position:relative;">
    <span id="bannerText">3</span>
    <div class="banner-sub" id="bannerSub"></div>
  </div>
</div>

<script>
(function () {
  var wrap = document.getElementById('wrap');
  var roundLabel = document.getElementById('roundLabel');
  var aliveLine = document.getElementById('aliveLine');
  var banner = document.getElementById('banner');
  var bannerText = document.getElementById('bannerText');
  var bannerSub = document.getElementById('bannerSub');

  var lastBannerKey = '';
  var bannerTimeout = null;

  function setBanner(text, sub, cls, holdMs) {
    var key = String(cls || '') + '|' + String(text || '');
    if (key === lastBannerKey) return;
    lastBannerKey = key;
    bannerText.textContent = text;
    bannerSub.textContent = sub || '';
    banner.className = 'banner show' + (cls ? ' ' + cls : '');
    // Force reflow so the animation re-triggers when text changes.
    void banner.offsetWidth;
    banner.className = 'banner show' + (cls ? ' ' + cls : '');
    if (bannerTimeout) clearTimeout(bannerTimeout);
    if (holdMs > 0) {
      bannerTimeout = setTimeout(function () {
        banner.className = 'banner';
        bannerText.textContent = '';
        bannerSub.textContent = '';
        lastBannerKey = '';
      }, holdMs);
    }
  }

  function clearBannerImmediate() {
    if (bannerTimeout) { clearTimeout(bannerTimeout); bannerTimeout = null; }
    banner.className = 'banner';
    bannerText.textContent = '';
    bannerSub.textContent = '';
    lastBannerKey = '';
  }

  function render(state) {
    if (!state) return;
    var s = state.neonRound;
    if (!s) return;

    if (s.round && s.round > 0) {
      wrap.classList.remove('hidden');
      var bestOf = (s.roundsToWin || 3);
      roundLabel.textContent = 'Round ' + s.round + ' · First to ' + bestOf;
      aliveLine.textContent = (s.aliveCount || 0) + ' bike' + ((s.aliveCount === 1) ? '' : 's') + ' alive';
    } else {
      wrap.classList.add('hidden');
    }

    // Phase-driven banner: countdown shows numbers, GO flash on running,
    // winner banner during intermission. We don't echo a banner during
    // running unless something interesting just happened.
    if (s.phase === 'countdown' && s.countdown > 0) {
      setBanner(String(s.countdown), 'GET READY', '', 0);
    } else if (s.phase === 'running') {
      // Only flash GO on the first running tick (when banner key was a
      // countdown number). Once that animation has played we clear.
      if (lastBannerKey.indexOf('|3') >= 0 || lastBannerKey.indexOf('|2') >= 0 || lastBannerKey.indexOf('|1') >= 0) {
        setBanner('GO', 'RIDE', 'go', 900);
      }
    } else if (s.phase === 'intermission') {
      // The banner content here is best fed by round_ended event; the
      // generic intermission text reads as "ROUND OVER" when nothing
      // more specific has landed. Winner appears below in scoreboard.
      setBanner('ROUND OVER', 'NEXT ROUND IN ' + (s.countdown || 0), 'winner', 0);
    } else if (s.phase === 'idle') {
      clearBannerImmediate();
    }
  }

  window.addEventListener('message', function (e) {
    if (!e.data || e.data.type !== 'gameState') return;
    render(e.data.state);
  });
})();
</script>
</body>
</html>
