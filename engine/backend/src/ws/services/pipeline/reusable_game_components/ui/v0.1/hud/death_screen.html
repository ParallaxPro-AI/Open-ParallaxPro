<!-- description: player death overlay with "YOU DIED" message and respawn indicator — death screen, game over, respawn, death panel, mortality -->
<!DOCTYPE html>
<html><head><style>
* { margin:0;padding:0;box-sizing:border-box; }
body { font-family:'Inter',system-ui,sans-serif;pointer-events:none;overflow:hidden; }
.death { position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(60,0,0,0.55);display:flex;flex-direction:column;align-items:center;justify-content:center;animation:fadeIn 0.6s ease; }
@keyframes fadeIn { from{opacity:0;} to{opacity:1;} }
.death-text { font-size:52px;font-weight:900;color:#ef4444;text-shadow:0 0 25px rgba(239,68,68,0.5);letter-spacing:4px; }
.death-sub { font-size:14px;color:rgba(255,255,255,0.4);margin-top:8px; }
</style></head><body>
<div class="death"><div class="death-text">YOU DIED</div><div class="death-sub">Respawning...</div></div>
</body></html>
