<!-- description: Racing lap timer with lap progress indicators and urgency blink — lap count, elapsed time, race duration, track progress, speedrun -->
<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
    color: #f6efe2;
    background: transparent;
    pointer-events: none;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }
  .panel {
    position: fixed;
    top: 14px;
    left: 14px;
    width: 180px;
    background: rgba(20, 14, 8, 0.85);
    border: 2px solid rgba(255, 200, 80, 0.45);
    border-left: 6px solid rgba(255, 200, 80, 0.75);
    border-radius: 10px;
    padding: 8px 12px 10px;
    box-shadow: 0 6px 22px rgba(0, 0, 0, 0.55);
  }
  .panel.hidden { display: none; }
  .row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }
  .label {
    font-size: 9px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: rgba(255, 220, 160, 0.55);
    font-weight: 800;
  }
  .timer {
    font-family: 'Menlo', 'Consolas', monospace;
    font-weight: 800;
    color: #ffe48a;
    font-size: 22px;
    text-shadow: 0 0 10px rgba(255, 200, 80, 0.4);
    margin-top: 2px;
    font-variant-numeric: tabular-nums;
    line-height: 1;
  }
  .timer.urgent { color: #f08484; animation: blink 0.6s infinite alternate; }
  @keyframes blink { from { opacity: 0.55; } to { opacity: 1; } }
  .lap-row {
    margin-top: 4px;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }
  .lap-pips {
    display: flex;
    gap: 3px;
    margin-top: 4px;
  }
  .lap-pip {
    flex: 1;
    height: 4px;
    background: rgba(255, 200, 80, 0.18);
    border: 1px solid rgba(255, 200, 80, 0.35);
    border-radius: 2px;
  }
  .lap-pip.complete { background: linear-gradient(90deg, #ffd066, #ffe48a); border-color: #ffd066; box-shadow: 0 0 6px rgba(255, 200, 80, 0.55); }
  .lap-pip.current { background: rgba(255, 200, 80, 0.35); border-color: #ffd066; }
</style>
</head>
<body>
<div class="panel hidden" id="panel">
  <div class="row">
    <div class="label">Time</div>
  </div>
  <div class="timer" id="timer">0:00</div>
  <div class="lap-row">
    <div class="label">Lap</div>
    <div class="label" id="lapLabel">1 / 3</div>
  </div>
  <div class="lap-pips" id="pips"></div>
</div>
<script>
(function () {
  var panel = document.getElementById('panel');
  var timerEl = document.getElementById('timer');
  var lapLabel = document.getElementById('lapLabel');
  var pips = document.getElementById('pips');
  var lastLapsToWin = -1;

  function fmt(sec) {
    sec = Math.max(0, Math.round(sec));
    var m = Math.floor(sec / 60), s = sec % 60;
    return m + ':' + (s < 10 ? '0' + s : s);
  }

  function render(t) {
    if (!t) return;
    panel.classList.remove('hidden');
    var elapsed = Math.max(0, Math.floor(t.elapsed || 0));
    var duration = Math.max(1, Math.floor(t.duration || 360));
    var remaining = Math.max(0, duration - elapsed);
    timerEl.textContent = fmt(remaining);
    timerEl.classList.toggle('urgent', remaining > 0 && remaining <= 15);
    var lap = Math.max(1, Math.floor(t.lap || 1));
    var lapsToWin = Math.max(1, Math.floor(t.lapsToWin || 3));
    lapLabel.textContent = lap + ' / ' + lapsToWin;
    if (lapsToWin !== lastLapsToWin) {
      pips.innerHTML = '';
      for (var i = 0; i < lapsToWin; i++) {
        var d = document.createElement('div');
        d.className = 'lap-pip';
        pips.appendChild(d);
      }
      lastLapsToWin = lapsToWin;
    }
    var children = pips.children;
    for (var j = 0; j < children.length; j++) {
      children[j].classList.remove('complete', 'current');
      if (j + 1 < lap) children[j].classList.add('complete');
      else if (j + 1 === lap) children[j].classList.add('current');
    }
  }

  window.addEventListener('message', function (e) {
    if (!e.data || e.data.type !== 'gameState') return;
    var s = e.data.state || {};
    if (s.lapTimer) render(s.lapTimer);
  });
})();
</script>
</body>
</html>
