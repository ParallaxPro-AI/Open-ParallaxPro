<!-- description: end turn button and keyboard control hints for game navigation — turn control, input help, move unit, pan camera -->
<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', 'SF Pro Display', system-ui, sans-serif; pointer-events: none; overflow: hidden; }
  .end-turn-wrap {
    position: fixed; bottom: 70px; right: 18px; pointer-events: auto;
  }
  .end-turn-btn {
    padding: 10px 28px; font-size: 14px; font-weight: 700;
    letter-spacing: 1px; text-transform: uppercase; color: #fff;
    background: linear-gradient(135deg, #3b82f6, #2563eb);
    border: 1px solid rgba(255,255,255,0.15); border-radius: 8px;
    cursor: pointer; transition: transform 0.1s, box-shadow 0.2s;
    box-shadow: 0 2px 12px rgba(37, 99, 235, 0.3);
  }
  .end-turn-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 18px rgba(37, 99, 235, 0.45); }
  .end-turn-btn:active { transform: translateY(0); }
  .controls {
    position: fixed; bottom: 18px; right: 18px;
    font-size: 9px; font-weight: 600; color: #666;
    text-align: right;
  }
  .controls kbd {
    background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15);
    border-radius: 3px; padding: 1px 4px; font-size: 8px; font-weight: 700; color: #ccc;
  }
</style>
</head>
<body>
<div class="controls">
  <kbd>Tab</kbd> Select Unit &middot; <kbd>M</kbd> Move &middot; <kbd>WASD</kbd> Pan &middot; <kbd>+</kbd><kbd>-</kbd> Zoom
</div>
<div class="end-turn-wrap">
  <button class="end-turn-btn" data-interactive style="pointer-events:auto" id="btn-end-turn">End Turn</button>
</div>
<script>
(function(){
  function emit(action) {
    window.parent.postMessage({ type: 'game_command', action: action }, '*');
  }
  document.getElementById('btn-end-turn').onclick = function() { emit('end_turn'); };
})();
</script>
</body>
</html>
