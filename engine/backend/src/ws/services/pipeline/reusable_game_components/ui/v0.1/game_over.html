<!-- description: Victory or defeat screen overlay with modal centering — match end screen, game finished, win lose display, battle completion, final score screen -->
<!DOCTYPE html>
<html>
<head>
<meta name="pp-responsive" content="1">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg-overlay: rgba(0, 0, 0, 0.0);
    --text: #eaf0f6;
    --text-dim: #6b7280;
    --text-muted: #3e4550;
    --border: rgba(255,255,255,0.06);
    --border-hover: rgba(255,255,255,0.15);
    --accent: #6366f1;
    --accent-2: #8b5cf6;
    --victory: #34d399;
    --victory-glow: rgba(52, 211, 153, 0.3);
    --defeat: #ef4444;
    --defeat-glow: rgba(239, 68, 68, 0.3);
    --gold: #f59e0b;
  }

  body {
    font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
    color: var(--text);
    pointer-events: none;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  .hidden { display: none !important; }

  /* ===== OVERLAY ===== */
  .go-overlay {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 200;
    transition: background 1s ease;
    background: var(--bg-overlay);
  }

  .go-overlay.visible {
    background: rgba(0, 0, 0, 0.8);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
  }

  /* ===== TITLE ===== */
  .go-title {
    font-size: 72px;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 10px;
    line-height: 1;
    opacity: 0;
    transform: scale(1.5);
    transition: none;
  }

  .go-overlay.visible .go-title {
    animation: goTitleReveal 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }

  @keyframes goTitleReveal {
    0% { opacity: 0; transform: scale(1.5); letter-spacing: 30px; filter: blur(10px); }
    60% { filter: blur(0); }
    100% { opacity: 1; transform: scale(1); letter-spacing: 10px; filter: blur(0); }
  }

  .go-title.victory {
    color: var(--victory);
    text-shadow: 0 0 80px var(--victory-glow), 0 4px 20px rgba(0,0,0,0.5);
  }

  .go-title.defeat {
    color: var(--defeat);
    text-shadow: 0 0 80px var(--defeat-glow), 0 4px 20px rgba(0,0,0,0.5);
  }

  /* Decorative line under title */
  .go-line {
    width: 0;
    height: 2px;
    margin-top: 16px;
    border-radius: 1px;
    opacity: 0;
  }

  .go-overlay.visible .go-line {
    animation: goLineExpand 0.6s cubic-bezier(0.25, 0.8, 0.25, 1) 0.5s forwards;
  }

  .go-line.victory { background: linear-gradient(90deg, transparent, var(--victory), transparent); }
  .go-line.defeat { background: linear-gradient(90deg, transparent, var(--defeat), transparent); }

  @keyframes goLineExpand {
    from { width: 0; opacity: 0; }
    to { width: 120px; opacity: 0.6; }
  }

  /* ===== SCORE ===== */
  .go-score-area {
    margin-top: 24px;
    text-align: center;
    opacity: 0;
  }

  .go-overlay.visible .go-score-area {
    animation: goFadeUp 0.6s ease 0.7s forwards;
  }

  .go-score-label {
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 3px;
    color: var(--text-dim);
    margin-bottom: 4px;
  }

  .go-score-value {
    font-size: 48px;
    font-weight: 800;
    color: var(--gold);
    font-variant-numeric: tabular-nums;
    text-shadow: 0 0 30px rgba(245, 158, 11, 0.2);
  }

  /* ===== STATS ROW ===== */
  .go-stats {
    display: flex;
    gap: 32px;
    margin-top: 20px;
    opacity: 0;
  }

  .go-overlay.visible .go-stats {
    animation: goFadeUp 0.6s ease 0.9s forwards;
  }

  .go-stat {
    text-align: center;
  }

  .go-stat-val {
    font-size: 22px;
    font-weight: 800;
    color: var(--text);
  }

  .go-stat-label {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-muted);
    margin-top: 2px;
  }

  @keyframes goFadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ===== BUTTONS ===== */
  .go-buttons {
    display: flex;
    gap: 12px;
    margin-top: 40px;
    opacity: 0;
  }

  .go-overlay.visible .go-buttons {
    animation: goFadeUp 0.6s ease 1.1s forwards;
  }

  .go-btn {
    padding: 14px 32px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: rgba(255, 255, 255, 0.03);
    color: var(--text);
    font-family: inherit;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    cursor: pointer;
    pointer-events: auto;
    transition: all 0.2s cubic-bezier(0.25, 0.8, 0.25, 1);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }

  .go-btn:hover {
    border-color: var(--border-hover);
    transform: translateY(-2px);
    box-shadow: 0 6px 24px rgba(0,0,0,0.3);
  }

  .go-btn:active {
    transform: translateY(0);
    transition-duration: 0.05s;
  }

  .go-btn.primary {
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    border-color: transparent;
    font-weight: 700;
  }

  .go-btn.primary:hover {
    filter: brightness(1.12);
    box-shadow: 0 6px 24px rgba(99, 102, 241, 0.3);
  }

  /* ===== AMBIENT GLOW (behind title) ===== */
  .ambient-glow {
    position: absolute;
    width: 400px;
    height: 200px;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0;
    z-index: -1;
    transition: opacity 1.5s ease;
  }

  .ambient-glow.victory { background: var(--victory-glow); }
  .ambient-glow.defeat { background: var(--defeat-glow); }

  .go-overlay.visible .ambient-glow { opacity: 0.5; }

  /* Mobile (touch primary): scale hero, cap glow + score widths. */
  @media (pointer: coarse) {
    .go-title { font-size: clamp(40px, 11vw, 72px); letter-spacing: 4px; }
    .go-score-value { font-size: clamp(32px, 9vw, 48px); }
    .ambient-glow { width: min(400px, 90vw); }
  }
</style>
</head>
<body>

<div class="go-overlay visible" id="go-overlay">
  <div class="ambient-glow" id="ambient-glow"></div>

  <div class="go-title defeat" id="go-title">GAME OVER</div>
  <div class="go-line defeat" id="go-line"></div>

  <div class="go-score-area" id="go-score-area">
    <div class="go-score-label">Final Score</div>
    <div class="go-score-value" id="go-score-value">0</div>
  </div>

  <div class="go-stats hidden" id="go-stats"></div>

  <div class="go-buttons">
    <button class="go-btn primary" id="btn-play-again" data-interactive style="pointer-events:auto">Play Again</button>
    <button class="go-btn" id="btn-main-menu" data-interactive style="pointer-events:auto">Main Menu</button>
  </div>
</div>

<script>
(function() {
  var overlay = document.getElementById('go-overlay');
  var scoreTarget = 0;
  var scoreDisplay = 0;
  var animFrame = null;

  function emit(action) {
    window.parent.postMessage({ type: 'game_command', action: action }, '*');
  }

  document.getElementById('btn-play-again').onclick = function() { emit('play_again'); };
  document.getElementById('btn-main-menu').onclick = function() { emit('main_menu'); };

  // Animated score counter
  function animateScore() {
    if (Math.abs(scoreDisplay - scoreTarget) < 1) {
      scoreDisplay = scoreTarget;
      document.getElementById('go-score-value').textContent = Math.round(scoreDisplay).toLocaleString();
      return;
    }
    scoreDisplay += (scoreTarget - scoreDisplay) * 0.08;
    document.getElementById('go-score-value').textContent = Math.round(scoreDisplay).toLocaleString();
    animFrame = requestAnimationFrame(animateScore);
  }

  function update(state) {
    if (!state) return;

    if (state._gameOver) {
      var title = state._gameOver.title || 'GAME OVER';
      var isWin = /win|victory|success|congrat/i.test(title);
      var cls = isWin ? 'victory' : 'defeat';

      // Title
      var titleEl = document.getElementById('go-title');
      titleEl.textContent = title;
      titleEl.className = 'go-title ' + cls;

      // Line
      document.getElementById('go-line').className = 'go-line ' + cls;

      // Ambient glow
      document.getElementById('ambient-glow').className = 'ambient-glow ' + cls;

      // Score
      if (state._gameOver.score !== undefined) {
        document.getElementById('go-score-area').style.display = '';
        scoreTarget = Number(state._gameOver.score) || 0;
        scoreDisplay = 0;
        if (animFrame) cancelAnimationFrame(animFrame);
        // Delay score animation to sync with reveal
        setTimeout(function() {
          animateScore();
        }, 800);
      } else {
        document.getElementById('go-score-area').style.display = 'none';
      }

      // Optional stats (kills, deaths, time, etc.)
      var statsEl = document.getElementById('go-stats');
      if (state._gameOver.stats && typeof state._gameOver.stats === 'object') {
        var statsHtml = '';
        var entries = Object.entries(state._gameOver.stats);
        for (var i = 0; i < entries.length; i++) {
          statsHtml += '<div class="go-stat"><div class="go-stat-val">' + entries[i][1] + '</div><div class="go-stat-label">' + entries[i][0] + '</div></div>';
        }
        statsEl.innerHTML = statsHtml;
        statsEl.classList.remove('hidden');
      } else {
        statsEl.classList.add('hidden');
      }

      // Show with animation
      overlay.classList.remove('hidden');
      requestAnimationFrame(function() {
        overlay.classList.add('visible');
      });
    }

    // Allow hiding
    if (state._gameOverDismiss) {
      overlay.classList.remove('visible');
      setTimeout(function() { overlay.classList.add('hidden'); }, 600);
    }
  }

  window.addEventListener('message', function(e) {
    if (e.data && e.data.type === 'gameState') update(e.data.state);
  });
  Object.defineProperty(window, 'gameState', {
    configurable: true,
    set: function(val) { update(val); },
    get: function() { return {}; }
  });
})();
</script>
</body>
</html>
