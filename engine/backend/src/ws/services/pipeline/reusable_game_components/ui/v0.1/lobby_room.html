<!-- description: lobby room display with player list and ready status — player lobby, ready check, player list, game start, team display -->
<!DOCTYPE html>
<html>
<head>
<meta name="pp-responsive" content="1">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg-dark: rgba(8, 8, 14, 0.92);
    --border: rgba(255,255,255,0.06);
    --border-hover: rgba(255,255,255,0.15);
    --text: #eaf0f6;
    --text-dim: #6b7280;
    --text-muted: #3e4550;
    --accent-1: #6366f1;
    --accent-2: #8b5cf6;
    --accent-3: #ec4899;
    --ok: #22c55e;
    --warn: #eab308;
    --err: #ef4444;
  }
  body {
    font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
    color: var(--text);
    background: rgba(0,0,0,0.55);
    pointer-events: none;
    overflow: hidden;
  }
  .wrap {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    padding: 24px;
  }
  .panel {
    width: min(680px, 100%);
    max-height: 88vh;
    display: flex; flex-direction: column;
    background: var(--bg-dark);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 22px;
    backdrop-filter: blur(14px);
    pointer-events: auto;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  .head {
    display: flex; align-items: flex-start; justify-content: space-between;
    padding-bottom: 14px; border-bottom: 1px solid var(--border); margin-bottom: 14px;
  }
  .head .title {
    font-size: 20px; font-weight: 800; letter-spacing: 2.5px;
    text-transform: uppercase;
    background: linear-gradient(135deg, var(--accent-1), var(--accent-3));
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .head .meta {
    font-size: 11px; color: var(--text-dim);
    letter-spacing: 1.5px; text-transform: uppercase;
    margin-top: 4px;
  }
  .head .count {
    font-size: 12px; color: var(--text-dim);
    letter-spacing: 2px; text-transform: uppercase;
  }
  .head .ping {
    font-size: 11px; margin-top: 4px;
    letter-spacing: 1px; text-transform: uppercase;
    font-variant-numeric: tabular-nums;
    text-align: right;
  }
  .ping-good { color: var(--ok); }
  .ping-mid  { color: var(--warn); }
  .ping-bad  { color: var(--err); }
  .list {
    flex: 1;
    display: flex; flex-direction: column; gap: 6px;
    overflow-y: auto;
    min-height: 200px;
    padding-right: 4px;
  }
  .list::-webkit-scrollbar { width: 6px; }
  .list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }

  .pl-row {
    display: grid;
    grid-template-columns: 1fr auto auto;
    gap: 10px;
    align-items: center;
    padding: 10px 12px;
    border: 1px solid var(--border);
    background: rgba(255,255,255,0.02);
    border-radius: 10px;
  }
  .pl-row .u { font-weight: 600; display: flex; align-items: center; gap: 8px; }
  .pl-row .badge {
    font-size: 10px; padding: 2px 8px; border-radius: 999px;
    letter-spacing: 1px; text-transform: uppercase;
  }
  .pl-row .badge.host { background: linear-gradient(135deg, var(--accent-1), var(--accent-2)); }
  .pl-row .badge.you { background: rgba(255,255,255,0.08); color: var(--text-dim); }
  .pl-row .ready {
    font-size: 11px; letter-spacing: 1px; text-transform: uppercase;
    color: var(--warn);
  }
  .pl-row .ready.on { color: var(--ok); }
  .pl-row .kick-btn {
    background: transparent; color: var(--err);
    border: 1px solid rgba(239,68,68,0.4);
    border-radius: 6px;
    font-family: inherit; font-size: 10px; letter-spacing: 1px; text-transform: uppercase;
    padding: 4px 8px;
    cursor: pointer;
  }
  .pl-row .kick-btn:hover { background: rgba(239,68,68,0.12); }

  .actions {
    display: flex; gap: 8px; margin-top: 14px;
    padding-top: 14px; border-top: 1px solid var(--border);
  }
  .btn {
    flex: 1;
    border: 1px solid var(--border);
    background: rgba(255,255,255,0.03);
    color: var(--text);
    font-family: inherit; font-size: 12px; font-weight: 600;
    letter-spacing: 1.5px; text-transform: uppercase;
    padding: 12px;
    border-radius: 8px; cursor: pointer;
    transition: all 0.2s;
  }
  .btn:hover { border-color: var(--border-hover); transform: translateY(-1px); }
  .btn.primary {
    background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
    border-color: transparent;
  }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn.ready-on { background: rgba(34, 197, 94, 0.2); border-color: rgba(34,197,94,0.5); }

  .err {
    font-size: 12px; color: var(--err); margin-top: 8px;
  }

  /* Mobile (touch primary) only — desktop must stay identical to its
     pre-responsive-overhaul layout. Three things here:
       1. Tighten side padding so the panel uses available width.
       2. Give the panel a fixed-ish height (560px or 85vh) like
          lobby_browser, so the player list scrolls internally rather
          than the panel growing/shrinking with the player count.
          Drop list min-height to 0 so it shrinks inside the panel.
       3. Tighter actions margin/pad and smaller button text so all
          three buttons fit on a phone width. */
  @media (pointer: coarse) {
    .wrap { padding: 24px 12px; }
    .panel { height: min(560px, 85vh); max-height: none; }
    .list { min-height: 0; }
    .actions { margin-top: 10px; padding-top: 10px; }
    .actions .btn { font-size: 11px; padding: 10px 8px; letter-spacing: 1px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="panel">
    <div class="head">
      <div>
        <div class="title" id="title">Lobby</div>
        <div class="meta" id="meta">Waiting for players</div>
      </div>
      <div>
        <div class="count" id="count">0/0</div>
        <div class="ping" id="ping" style="display:none;"></div>
      </div>
    </div>

    <div class="list" id="list"></div>

    <div class="err" id="err"></div>

    <div class="actions">
      <button class="btn" id="btn-leave">Leave</button>
      <button class="btn" id="btn-ready">Ready up</button>
      <button class="btn primary" id="btn-start">Start game</button>
    </div>
  </div>
</div>

<script>
(function () {
  var listEl = document.getElementById('list');
  var countEl = document.getElementById('count');
  var pingEl = document.getElementById('ping');
  var metaEl = document.getElementById('meta');
  var titleEl = document.getElementById('title');
  var btnReady = document.getElementById('btn-ready');
  var btnStart = document.getElementById('btn-start');
  var errEl = document.getElementById('err');
  var amHost = false;
  var ready = false;
  var roster = null;
  var localPeerId = '';
  var pingMs = -1;
  var pingConnected = false;

  function emit(action, payload) {
    var msg = { type: 'game_command', action: action };
    if (payload) msg.payload = payload;
    window.parent.postMessage(msg, '*');
  }

  function escape(s) {
    return String(s || '').replace(/[&<>"']/g, function (c) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
    });
  }

  function __cp(n){try{if(window.parent&&window.parent.ppCheckpoint)window.parent.ppCheckpoint('lobby_room: '+n);}catch(_){}}
  __cp('script booted');
  function render() {
    __cp('render rosterPeers=' + (roster ? roster.peers.length : 'null'));
    if (!roster) {
      listEl.innerHTML = '';
      titleEl.textContent = 'Lobby';
      metaEl.textContent = 'Connecting…';
      countEl.textContent = '';
      // Hide both action buttons until we know the role; otherwise they
      // appear greyed-out and confusing.
      btnReady.style.display = 'none';
      btnStart.style.display = 'none';
      return;
    }

    titleEl.textContent = roster.name;
    var slots = roster.maxPlayers;
    countEl.textContent = roster.peers.length + '/' + slots;

    // Ping to host (non-host only — host is "0ms" by definition).
    if (amHost) {
      pingEl.style.display = 'none';
    } else {
      pingEl.style.display = '';
      var label = pingMs < 0 ? '— ping' : Math.round(pingMs) + 'ms ping';
      pingEl.textContent = label;
      var pclass = 'ping-good';
      if (pingMs >= 150) pclass = 'ping-bad';
      else if (pingMs >= 80) pclass = 'ping-mid';
      pingEl.className = 'ping ' + (pingMs < 0 ? '' : pclass);
    }

    var readyCount = roster.peers.filter(function (p) { return p.isReady || p.isHost; }).length;
    var enoughPlayers = roster.peers.length >= (roster.minPlayers || 1);
    var canStart = amHost && enoughPlayers && readyCount === roster.peers.length;
    btnStart.disabled = !canStart;
    btnStart.style.display = amHost ? '' : 'none';
    // Helpful tooltip so a disabled button explains itself.
    btnStart.title = !amHost
      ? 'Only the host can start the match'
      : !enoughPlayers
        ? 'Need at least ' + (roster.minPlayers || 1) + ' players to start'
        : readyCount !== roster.peers.length
          ? 'Waiting for all players to ready up'
          : 'Start the match';

    metaEl.textContent = amHost
      ? 'You are hosting · ' + (canStart ? 'Ready to start' : (enoughPlayers ? 'Waiting for players to ready up' : 'Waiting for more players (' + roster.peers.length + '/' + (roster.minPlayers || 1) + ' min)'))
      : (ready ? 'Ready' : 'Waiting — press Ready up when prepared');

    listEl.innerHTML = '';
    roster.peers.forEach(function (p) {
      var row = document.createElement('div');
      row.className = 'pl-row';
      var badges = '';
      if (p.isHost) badges += '<span class="badge host">Host</span>';
      if (p.peerId === localPeerId) badges += '<span class="badge you">You</span>';

      var readyBit = p.isHost
        ? '<span class="ready on">Host</span>'
        : '<span class="ready ' + (p.isReady ? 'on' : '') + '">' + (p.isReady ? 'Ready' : 'Not ready') + '</span>';

      var kick = (amHost && !p.isHost)
        ? '<button class="kick-btn" data-kick="' + p.peerId + '">Kick</button>'
        : '<span></span>';

      row.innerHTML =
        '<div class="u">' + escape(p.username) + badges + '</div>' +
        readyBit + kick;

      listEl.appendChild(row);
    });

    Array.prototype.forEach.call(listEl.querySelectorAll('[data-kick]'), function (btn) {
      btn.addEventListener('click', function () { emit('kick_player', { peerId: btn.getAttribute('data-kick') }); });
    });

    btnReady.textContent = ready ? 'Unready' : 'Ready up';
    btnReady.classList.toggle('ready-on', ready);
    btnReady.style.display = amHost ? 'none' : '';
  }

  document.getElementById('btn-leave').onclick = function () { emit('leave_lobby'); };
  btnReady.onclick = function () {
    ready = !ready;
    emit('toggle_ready', { ready: ready });
    render();
  };
  btnStart.onclick = function () { emit('start_game'); };

  // Dedupe state pushes: render() does listEl.innerHTML='' which on iOS
  // WKWebView suppresses the synthesized click after a touchend if the
  // mutation lands between touchstart and touchend. mp_bridge re-pushes
  // state at the framework's push rate, including ping fluctuations and
  // identical roster snapshots — re-rendering the player list 30-60Hz
  // for visually-identical content kills the Start Game button click on
  // iOS when peers are present (with 1 row, the mutation window is too
  // small to overlap; with 2+ rows, it widens enough to swallow clicks).
  // Same root cause as the lobby_browser fix in commit cf36385. Hash
  // the fields render() actually consumes; bucket ping at 10ms granularity
  // so cosmetic drift doesn't trigger a rebuild.
  var lastRenderKey = '';
  function computeRenderKey() {
    var rosterPart = 'null';
    if (roster) {
      rosterPart = roster.name + '|' + (roster.maxPlayers || 0) + '|' + (roster.minPlayers || 0)
        + '|' + roster.peers.map(function(p){
          return p.peerId + ':' + (p.isHost?'H':'') + (p.isReady?'R':'') + ':' + (p.username||'');
        }).join(',');
    }
    return [
      rosterPart,
      amHost ? '1' : '0',
      ready ? '1' : '0',
      Math.max(0, Math.round(pingMs / 10)),
      pingConnected ? '1' : '0',
      errEl.textContent || ''
    ].join('::');
  }
  window.addEventListener('message', function (e) {
    if (!e.data || e.data.type !== 'gameState') return;
    var state = e.data.state || {};
    if (state.multiplayer) {
      roster = state.multiplayer.roster || null;
      amHost = !!state.multiplayer.isHost;
      localPeerId = state.multiplayer.localPeerId || '';
      ready = !!state.multiplayer.localReady;
      if (typeof state.multiplayer.ping === 'number') pingMs = state.multiplayer.ping;
      pingConnected = state.multiplayer.connected !== false;
    }
    if (state.errorMessage !== undefined) errEl.textContent = state.errorMessage || '';
    var key = computeRenderKey();
    if (key === lastRenderKey) return;  // nothing visible changed; skip render()
    lastRenderKey = key;
    render();
  });
})();
</script>
</body>
</html>
