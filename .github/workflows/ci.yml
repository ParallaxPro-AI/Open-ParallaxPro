name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install
        working-directory: engine/backend
        run: npm install
      - name: Typecheck
        working-directory: engine/backend
        run: npx tsc --noEmit
      - name: Test
        working-directory: engine/backend
        run: npm test

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install
        working-directory: engine/frontend/editor
        run: npm install
      - name: Build
        working-directory: engine/frontend/editor
        run: npm run build
